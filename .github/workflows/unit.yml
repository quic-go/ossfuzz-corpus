on: [push, pull_request]

permissions: read-all

jobs:
  unit:
    runs-on: ubuntu-latest
    name: Unit tests
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.25.x
          check-latest: true
      - run: go test -shuffle=on -v ./...
      - run: go test -shuffle=on -v ./...
        working-directory: testing
